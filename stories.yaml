stories:
  - id: story_01_recipe_ai_parser
    title: AI Recipe Importer
    description: >
      As a user, I want to paste a recipe URL or raw text into an input field so that
      the app can automatically extract the title, ingredients (with units/quantities),
      and prep steps into a structured format without manual data entry.
    acceptance_criteria:
      - App has a text area for raw text and an input field for URLs.
      - App sends the raw input to an LLM endpoint (e.g., OpenAI/Anthropic) with a strict JSON schema prompt.
      - The extracted data is displayed in a review UI so the user can edit or correct any AI hallucinations before saving.
      - Saved recipes are stored in the database with normalized ingredient names (e.g., "1/2 cup diced onions" becomes {name: "onion", prep: "diced", amount: 0.5, unit: "cup"}).

  - id: story_01b_recipe_review_edit_ui
    title: Editable AI Recipe Review UI
    description: >
      As a user, after the AI parses my recipe I want to review and edit the
      extracted ingredients and steps before saving, so I can correct any
      AI hallucinations before they enter the database.
    acceptance_criteria:
      - The review panel (shown after AI parsing) renders each ingredient as an
        editable row (name, prep, amount, unit fields).
      - The user can add or remove ingredient rows.
      - The user can edit prep_steps and active_steps as editable list items.
      - A "Save Recipe" button submits the corrected data to the DB.
      - Cancelling discards the parse result and returns the user to the import form.
    depends_on: story_01_recipe_ai_parser

  - id: story_02_magic_auto_planner
    title: Magic Menu Auto-Planner
    description: >
      As a user, I want to input weekly preferences (e.g., number of meals,
      must-have ingredients, max prep time) so that the app generates a
      suggested meal plan, minimizing decision fatigue.
    acceptance_criteria:
      - App has a UI to set weekly parameters (meal count, ingredient includes/excludes, max total prep time).
      - An algorithm queries the recipe database and selects a combination of meals that fit the parameters.
      - The app attempts to select recipes that share perishable ingredients to minimize food waste.
      - The generated plan is displayed in a review UI where the user can click "Swap" on an individual meal.
      - User can "Approve" the final generated menu.

  - id: story_03_smart_shopping_list
    title: Smart Categorized Shopping List
    description: >
      As a user, I want the app to aggregate all ingredients from my approved weekly menu,
      subtract items I keep permanently in stock, and group the final list by supermarket
      aisle so that my grocery trip is as fast and efficient as possible.
    acceptance_criteria:
      - App mathematically aggregates identical ingredients across all selected recipes.
      - App maintains a user-configurable "Always in Stock" database and automatically filters these out.
      - App maps each ingredient to a standard supermarket category (Produce, Meat, Dairy, etc.) and renders the list grouped.
      - UI allows users to manually add ad-hoc items to the list.
      - UI includes checkboxes to strike through items as they are added to the physical cart.

  - id: story_04_mise_en_place_split
    title: Phase-Based Step Categorization
    description: >
      As a user, I want every recipe to distinctly separate "Prep" tasks (chopping, measuring)
      from "Active Cooking" tasks (sauteing, boiling) so that I can practice true mise en place.
    acceptance_criteria:
      - The AI Recipe Parser (Story 1) is instructed to categorize extracted steps into `prep_steps` and `active_steps`.
      - The daily cooking UI presents a checklist of all `prep_steps` first.
      - The user must complete (or skip) the prep checklist before the UI reveals the `active_steps`.

  - id: story_05_prep_batching_engine
    title: Weekly Ingredient Prep Batching
    description: >
      As a user, I want the app to identify repeated prep tasks across my weekly menu
      and combine them into a single task so I only have to wash the cutting board once.
    acceptance_criteria:
      - App cross-references the weekly menu for identical ingredients with the same prep state.
      - App mathematically combines the required amounts into a unified batch task.
      - Logic includes a simple flag or AI check for "prep-ahead safe" ingredients.

  - id: story_06_prep_session_scheduler
    title: Custom Prep Session Builder
    description: >
      As a user, I want to create dedicated "Prep Sessions" (like a Sunday batch-prep)
      and assign batched tasks to them, so my weeknight cooking is as fast as using a meal kit.
    acceptance_criteria:
      - UI allows the user to create a "Prep Session" on a specific day.
      - User can drag and drop batched prep tasks (from Story 5) into this session.
      - Assigned tasks are automatically removed from the individual recipe's daily instructions (marked as "Already Prepped").

  - id: story_08_tech_stack_nextjs
    title: Next.js Full-Stack Architecture Setup
    description: >
      As a developer, I want to initialize a Next.js App Router project configured
      with Tailwind CSS and Drizzle ORM so that I have a unified full-stack environment
      with a responsive, mobile-first UI shell.
    acceptance_criteria:
      - Project is initialized using `npx create-next-app@latest` with App Router, TypeScript, and Tailwind enabled.
      - Drizzle ORM is installed and connected to the Turso SQLite database.
      - A responsive, mobile-first UI shell is implemented with a bottom navigation bar.
      - Bottom nav includes four tabs — Recipes, Plan, Shopping, and Prep.
      - Each tab routes to its own page (can be a placeholder).
      - The shell renders correctly on mobile viewport widths (375px+).
      - Active tab is visually highlighted in the bottom nav.

  - id: story_09_recipe_seeding_api
    title: Seed Database via TheMealDB API
    description: >
      As a developer, I want to fetch random recipes from the open-source
      TheMealDB JSON API so that my Turso database is populated with real-world
      data for testing.
    acceptance_criteria:
      - A Next.js Server Action fetches data from `https://www.themealdb.com/api/json/v1/1/random.php`.
      - The script maps TheMealDB's JSON schema into our clean relational schema.
      - The script downloads or hotlinks the `strMealThumb` image URLs.
      - The script inserts the transformed data into the Turso database using Drizzle.

  - id: story_10_grocery_cart_automation
    title: Playwright Grocery Cart Orchestration
    description: >
      As a user, I want the app to take my generated Smart Shopping List (Story 3)
      and automatically add those items to my Mathem or ICA digital shopping cart
      using a browser automation agent.
    acceptance_criteria:
      - App includes a Playwright script configured to run headlessly.
      - User handles login manually — the tool does not store or manage credentials.
      - A disclaimer is shown before the first automation run, explaining what the tool does and the user's responsibility.
      - The script iterates through the aggregated shopping list, using the search bar to find each item.
      - The script clicks the top-rated or cheapest "Add to Cart" button.
      - Missed or out-of-stock items are logged to an "Items Missed" array and returned to the UI.
      - User must review and confirm the cart before checkout — the tool never places an order.

  - id: story_11_user_risk_disclosure
    title: User Risk Disclosure & System Capabilities
    description: >
      As a user, I want to see a first-run disclaimer/consent screen that explains
      what the app does (and doesn't do) so that I understand the system's capabilities
      and my responsibilities before using automation features.
    acceptance_criteria:
      - A first-run consent screen is displayed before the user can access automation features.
      - "The disclaimer clearly explains:"
      - "  - What the tool automates (adding items to your grocery cart via browser automation)."
      - "  - What the tool does NOT do (store credentials, place orders, or access accounts without the user being logged in)."
      - "  - That the user is responsible for reviewing their cart before confirming any order."
      - "  - That this is a personal productivity tool, not a commercial service."
      - User must accept the disclaimer to proceed.
      - Acceptance is persisted (e.g., in local storage or the database) so the screen is not shown again.
      - A "System Capabilities" section is accessible from app settings, summarizing what the tool can and cannot do.
      - See docs/tos-analysis.md for the full Mathem/ICA ToS analysis backing these decisions.

  - id: story_12_deployment_pipeline
    title: CI/CD Pipeline with Vercel & Turso
    description: >
      As a developer, I want a GitHub Actions CI/CD pipeline that runs lint, tests,
      and build checks on every push, deploys to Vercel with Turso database migrations
      on merge to main, and creates isolated preview environments with branch databases
      for pull requests — modeled after the proven pipeline in ticolucci/itunes-port-to-spotify.
    acceptance_criteria:
      - GitHub Actions workflow ci-cd.yml with jobs lint, test, build, deploy, preview, and e2e-preview.
      - lint job runs npm run lint and npm run test:types (TypeScript type checking).
      - test job runs npm run test:unit with test environment variables.
      - build job runs npm run build and depends on lint + test passing.
      - deploy job (push to main only) runs npm run db:migrate against production Turso, then deploys via Vercel CLI.
      - preview job (PRs only) creates an isolated Turso branch database meal-prep-pr-<PR_NUMBER> seeded from production, runs migrations, deploys Vercel preview with branch DB credentials, and posts a status comment on the PR.
      - e2e-preview job (PRs only, after preview) installs Playwright Chromium, extracts preview URL from the PR comment, and runs npm run test:e2e against the live preview.
      - Separate cleanup-preview.yml workflow deletes the Turso branch database when a PR is closed.
      - vercel.json configured with ignoreCommand exit 0 to prevent Vercel auto-deploys.
      - .vercelignore excludes test files, docs, dev configs, and local DB files from Vercel builds.
      - .env.example created with all required environment variables documented.
      - package.json has db:migrate and test:types scripts.
      - playwright.config.ts supports BASE_URL env var override for running E2E against preview deployments.
      - docs/deployment.md documents the full pipeline, all required GitHub secrets, one-time manual setup steps, and troubleshooting.

  - id: story_13_google_oauth
    title: Google OAuth Authentication
    description: >
      As a developer, I want to add Google OAuth authentication using NextAuth.js
      so that only authorized users can access the application, protecting personal
      meal planning data.
    acceptance_criteria:
      - NextAuth.js (Auth.js v5) integrated with Google OAuth provider.
      - middleware.ts protects all routes except /auth/*, /api/auth/*, and static files.
      - Login page with Sign in with Google button.
      - ALLOWED_EMAIL environment variable restricts access to a single authorized email address.
      - Session information available in both Server Components and Client Components.
      - VERCEL_AUTOMATION_BYPASS_SECRET support in middleware to allow E2E tests to bypass auth (header x-vercel-protection-bypass).
      - E2E tests updated to send the bypass header when running against preview deployments.
      - All existing E2E tests continue to pass with auth bypass in CI.
      - docs/deployment.md updated with new required secrets (GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, AUTH_SECRET, ALLOWED_EMAIL, VERCEL_AUTOMATION_BYPASS_SECRET).
    annotations:
      e2e_impact: >
        This story requires updating all Playwright E2E tests and the CI/CD preview
        pipeline (story_12) to inject VERCEL_AUTOMATION_BYPASS_SECRET as an env var
        on preview deployments, and to configure Playwright to send the
        x-vercel-protection-bypass header on all requests when running in CI.
    depends_on: story_12_deployment_pipeline
