learnings:
  - id: l01_playwright_setup
    story: story_08_tech_stack_nextjs
    date: "2026-03-08"
    context: >
      Playwright is installed as a dev dependency. Only Chromium was installed
      (npx playwright install chromium). The mobile project in playwright.config.ts
      uses devices["iPhone 12"] but overrides defaultBrowserType to "chromium"
      to avoid needing a WebKit installation.
    gotcha: >
      The Next.js dev overlay (nextjs-portal) intercepts pointer events at the bottom
      of the viewport on narrow mobile screens, causing click actions to fail.
      Fix: use .click({ force: true }) on nav links in Playwright tests. This is a
      dev-mode artifact only — not a production issue.

  - id: l02_bottom_nav_active_state
    story: story_08_tech_stack_nextjs
    date: "2026-03-08"
    context: >
      BottomNav is a "use client" component that uses usePathname() from next/navigation
      to determine the active tab. Active tabs receive aria-current="page" for
      accessibility and test assertion, plus emerald-600 text colour.
    path: src/components/BottomNav.tsx

  - id: l03_routing_structure
    story: story_08_tech_stack_nextjs
    date: "2026-03-08"
    context: >
      Four tab routes are established: /recipes, /plan, /shopping, /prep.
      The root path (/) redirects to /recipes via next/navigation redirect().
      Each route has a placeholder page.tsx. The layout at src/app/layout.tsx
      wraps all pages with <main className="pb-16"> to avoid content being hidden
      behind the fixed bottom nav (h-16).

  - id: l04_next_story_candidates
    story: story_08_tech_stack_nextjs
    date: "2026-03-08"
    context: >
      With the shell complete, the highest-value next stories are:
      1. story_09_recipe_seeding_api — populates the DB with real recipes for testing.
         This unblocks story_01, story_02, story_03, story_04, story_05.
      2. story_01_recipe_ai_parser — requires Anthropic API key (ANTHROPIC_API_KEY env var).
      Recommend story_09 next because it has no external API key dependency and seeds
      real data that all subsequent stories can rely on.

  - id: l05_drizzle_schema_note
    story: story_09_recipe_seeding_api
    date: "2026-03-08"
    context: >
      Schema created at src/db/schema.ts. Two tables: `recipes` (id, external_id,
      title, image_url, instructions, source, created_at) and `recipe_ingredients`
      (id, recipe_id, name, measure, amount, unit, prep). Migration applied to
      local.db (file:./local.db). amount/unit/prep columns exist but are null for
      TheMealDB seeds — story_01 (AI parser) should populate them via normalization.
    gotcha: >
      drizzle-kit migrate requires a non-empty TURSO_AUTH_TOKEN even for local SQLite
      file URLs. Use a dummy value like "local" for development. The @libsql/client
      runtime accepts TURSO_AUTH_TOKEN="local" for file: URLs without complaining.
      .env.local is gitignored — ensure new devs create it from .env.local.example.

  - id: l06_seed_action
    story: story_09_recipe_seeding_api
    date: "2026-03-08"
    context: >
      Server Action at src/app/actions/seed.ts fetches ONE random meal from
      https://www.themealdb.com/api/json/v1/1/random.php, deduplicates by externalId,
      inserts recipe + up to 20 ingredients. Uses revalidatePath('/recipes') to
      trigger RSC re-render after insert.
    path: src/app/actions/seed.ts

  - id: l07_recipes_page
    story: story_09_recipe_seeding_api
    date: "2026-03-08"
    context: >
      src/app/recipes/page.tsx is a React Server Component with `export const dynamic
      = "force-dynamic"` to prevent static caching. It SSRs the recipe list from DB.
      SeedButton (src/components/SeedButton.tsx) is a "use client" component using
      useTransition to call the seedRecipes Server Action without a page reload.
      TheMealDB image hostname is whitelisted in next.config.ts remotePatterns.
    gotcha: >
      Without `export const dynamic = "force-dynamic"`, Next.js will statically
      render the recipes page at build time (showing 0 recipes always).

  - id: l08_playwright_or_strict_mode
    story: story_09_recipe_seeding_api
    date: "2026-03-08"
    context: >
      Playwright's locator.or() can violate strict mode when BOTH branches match.
      Fix: append .first() AFTER .or() — i.e., locatorA.or(locatorB).first() —
      not before.

  - id: l09_next_story_candidates
    story: story_09_recipe_seeding_api
    date: "2026-03-08"
    context: >
      With DB seeded, the highest-value next stories are:
      1. story_01_recipe_ai_parser — AI parsing of URLs/text into our schema.
         Requires ANTHROPIC_API_KEY in .env.local.
      2. story_02_magic_auto_planner — needs recipes in DB (now unblocked).
      3. story_04_mise_en_place_split — depends on story_01 (prep/active step split).
      Recommend story_01 next as it enriches recipe data quality for all downstream
      stories (planning, shopping list, prep batching).

  - id: l11_vitest_infrastructure
    story: story_01_recipe_ai_parser
    date: "2026-03-08"
    context: >
      Vitest is now fully configured (vitest.config.ts). Key settings:
      - env: { TURSO_DATABASE_URL: "file:./test.db", TURSO_AUTH_TOKEN: "local",
        ANTHROPIC_API_KEY: "test-key-for-vitest" } — so Server Actions that
        guard on these vars work in tests without real credentials.
      - globalSetup: src/test/globalSetup.ts runs `drizzle-kit migrate` against
        test.db before the suite and deletes test.db in teardown.
      - setupFiles: src/test/setup.ts mocks next/cache (revalidatePath,
        revalidateTag) globally — they throw outside Next.js request context.
      - test-client: src/db/test-client.ts creates a Drizzle client pointed at
        file:./test.db. Import this in integration tests instead of @/db.
      - factories: src/test/factories.ts — makeRecipe(), makeIngredient().
    npm_scripts: >
      "test:unit": "vitest run",
      "test:e2e": "playwright test",
      "test": "vitest run && playwright test"

  - id: l12_parser_lib
    story: story_01_recipe_ai_parser
    date: "2026-03-08"
    context: >
      src/lib/themealdb.ts — extractIngredients() pure function extracted from
      seed.ts. seed.ts now imports it from there.
      src/lib/parser.ts — parseAmount(measure) and normalizeIngredient(name, measure)
      pure functions. parseAmount handles: whole numbers, decimals, simple
      fractions (3/4), mixed numbers (1 1/2), number+unit (200g, 1 tsp),
      qualitative measures (pinch, to taste). normalizeIngredient detects prep
      from PREP_PREFIXES list (prefix pattern) or comma-suffix ("name, prep").
    coverage: >
      22 unit tests total (5 extractIngredients, 17 parseAmount/normalizeIngredient).
      All pass with no DB or HTTP dependencies.

  - id: l13_parse_recipe_action
    story: story_01_recipe_ai_parser
    date: "2026-03-08"
    context: >
      src/app/actions/parse-recipe.ts — parseRecipeText(rawText) Server Action.
      Calls Anthropic Claude Haiku (claude-haiku-4-5-20251001) via direct fetch
      (no SDK — avoids an additional dependency). Uses a system prompt that
      returns strict JSON: { title, prep_steps[], active_steps[], ingredients[] }.
      Saves recipe to DB with source="ai", stores prep_steps/active_steps as
      JSON strings in the new schema columns. Returns the parsed object so the
      UI can show a review panel before the user navigates away.
    gotcha: >
      Integration tests must stub global fetch BEFORE importing the action module
      (or use vi.stubGlobal in beforeEach). Module import caching means a mock
      set after import has no effect. Pattern: vi.stubGlobal("fetch", mock) then
      const { parseRecipeText } = await import("./parse-recipe").
    requires: ANTHROPIC_API_KEY in .env.local

  - id: l14_schema_prep_steps
    story: story_01_recipe_ai_parser
    date: "2026-03-08"
    context: >
      Migration 0001_amazing_network.sql adds prep_steps TEXT and active_steps
      TEXT columns to the `recipes` table. Values are JSON-serialized string
      arrays (e.g. '["Dice onion","Mince garlic"]'). story_04 (mise en place UI)
      should read these columns directly and parse them with JSON.parse().
      TheMealDB-seeded rows have NULL in both columns — that is expected.

  - id: l15_import_ui
    story: story_01_recipe_ai_parser
    date: "2026-03-08"
    context: >
      /recipes/import — RecipeImportForm.tsx client component. Flow:
      1. User pastes URL or raw text into <textarea data-testid="recipe-input">.
      2. Submit calls parseRecipeText Server Action.
      3. On success, shows read-only review panel (data-testid="import-success")
         with parsed title, ingredients list, prep steps, active steps.
      4. "View All Recipes" button redirects to /recipes.
      No editable review (that is story_01b — deferred). Full editable review
      UI should be added before the app goes to production.
    deferred: >
      Editable review UI (let user correct AI hallucinations before saving) was
      deferred. Current flow: AI output → immediate save → read-only review.
      Add story_01b to stories.yaml when ready to implement the edit flow.

  - id: l16_next_story_candidates
    story: story_01_recipe_ai_parser
    date: "2026-03-08"
    context: >
      story_01 is implemented (parser, action, import UI). Deferred: editable
      review UI (story_01b — to be added to stories.yaml).
      Next highest-value stories:
      1. story_02_magic_auto_planner — needs recipes in DB (now unblocked).
         Algorithm selects meals fitting weekly params; pure function
         (selectMealPlan) is unit-testable. No external API.
      2. story_04_mise_en_place_split — prep_steps/active_steps columns now
         exist; can build the cooking UI checklist immediately.
      3. story_03_smart_shopping_list — depends on story_02 approval flow.
      Recommend story_02 next: highest value unlock (opens 03, 05, 06).

  - id: l17_planner_algorithm
    story: story_02_magic_auto_planner
    date: "2026-03-08"
    context: >
      src/lib/planner.ts — selectMealPlan(candidates, params) pure function.
      Filters by excludeIngredients, includeIngredients (ingredient name match,
      case-insensitive), maxPrepMinutes (null prepMinutes = keep, assume unknown).
      Then greedily selects recipes maximising ingredient overlap with already-
      selected meals (minimises food waste / shopping list length). Deterministic:
      sorts pool by ID before greedy loop, uses ID as tiebreaker.
    gotcha: >
      The algorithm is purely greedy, not optimal (NP-hard to find truly optimal
      set). For small DBs (<100 recipes) this is fine. If the DB grows large,
      consider a randomised restart approach or simulated annealing.

  - id: l18_meal_plan_schema
    story: story_02_magic_auto_planner
    date: "2026-03-08"
    context: >
      Migration 0002_equal_mysterio.sql adds:
        - meal_plans (id, status, meal_count, params JSON, created_at)
        - meal_plan_recipes (id, plan_id FK, recipe_id FK, position)
        - prepMinutes INTEGER nullable column to recipes
      Status values: 'draft' | 'approved'. Only the most recent draft plan is
      shown in the UI. story_03 (shopping list) should query the latest approved
      plan using: WHERE status = 'approved' ORDER BY created_at DESC LIMIT 1.

  - id: l19_plan_page_ui
    story: story_02_magic_auto_planner
    date: "2026-03-08"
    context: >
      /plan page is a RSC (force-dynamic) that loads the latest draft plan and
      all recipes, then renders MealPlanClient.tsx (client component). Flow:
        1. Params form → generateMealPlan Server Action → window.location.reload()
        2. Review panel: each meal row has a Swap button that reveals a <select>
           of recipes not already in the plan.
        3. Approve button → approveMealPlan Server Action.
      The UI uses window.location.reload() after actions to re-fetch RSC data.
      This is simple but coarse — a future refactor could use router.refresh()
      from useRouter() for a smoother UX without a full page reload.
    deferred: >
      Swap UX: currently swaps by selecting from a dropdown of ALL other recipes.
      A better UX would show swap suggestions scored by ingredient overlap with
      the rest of the plan. Defer to a later polish story.
      prepMinutes: currently null for all DB recipes (TheMealDB doesn't expose it).
      AI parser (story_01) could extract prep time from recipe text and save it.

  - id: l20_vitest_parallelism_fix
    story: story_02_magic_auto_planner
    date: "2026-03-08"
    context: >
      Vitest runs test files in parallel by default. Integration test files that
      share the same test.db will race each other, causing non-deterministic
      failures (e.g. afterEach cleanup in one file interleaves with inserts in
      another). Fix: add `fileParallelism: false` to vitest.config.ts test block.
      This runs all test files sequentially. Since unit tests are fast (~10ms),
      the overhead is negligible (~9s total suite time).
    gotcha: >
      Also update every integration test file's beforeEach to delete FROM ALL
      tables in FK-safe order (dependents first). The canonical order for this
      project is: mealPlanRecipes → mealPlans → recipeIngredients → recipes.

  - id: l21_next_story_candidates
    story: story_02_magic_auto_planner
    date: "2026-03-08"
    context: >
      story_02 is complete (algorithm, DB schema, Server Actions, UI, tests).
      Next highest-value stories:
      1. story_03_smart_shopping_list — now fully unblocked (needs approved plan).
         aggregateIngredients() is a pure function; unit-testable. Depends on
         getting the latest approved plan's recipes + their ingredients.
      2. story_04_mise_en_place_split — prep_steps/active_steps columns exist.
         Can build the cooking UI checklist (prep phase → active phase) now.
      3. story_01b_recipe_review_edit_ui — editable review before DB save.
      Recommend story_03 next: it delivers end-user value (grocery list from
      approved plan) and its core logic is a pure aggregation function.

  - id: l10_test_pyramid_gap
    story: cross-cutting
    date: "2026-03-08"
    context: >
      The test suite is currently 100% E2E (17 Playwright browser tests, 0 unit,
      0 integration). This is an inverted pyramid: slow feedback, brittle to UI
      changes, and leaves all pure logic (ingredient mapping, aggregation, parsing)
      uncovered below the browser layer.

      TARGET PYRAMID:
        Unit (Vitest)       ~60% — pure functions, schema mappers, aggregation logic
        Integration (Vitest) ~25% — Server Actions + real local SQLite (file:./test.db)
        E2E (Playwright)    ~15% — critical user journeys only (not logic assertions)

      MOCK PHILOSOPHY (to be followed in all future test layers):
        DO mock: external HTTP calls (TheMealDB, Anthropic API, any fetch to a
          third-party host), the system clock (Date.now / new Date()), and any
          source of randomness. These are "impure" inputs that would require a
          monad boundary in a functional language — they make tests non-deterministic
          if left uncontrolled.
        DO NOT mock: the local database, Server Actions, internal query helpers,
          or React components. These are local dependencies that are cheap to
          configure with seed/factory data. Mocking them only tests the mock,
          not the real behaviour. Use a dedicated test SQLite file (file:./test.db)
          seeded with factories instead.

      IMPLEMENTATION PLAN (to be executed as a cross-cutting refactor story):
        1. Install Vitest + @vitejs/plugin-react + vitest-environment-miniflare (or
           jsdom) as devDependencies. Add a vitest.config.ts that points at
           src/**/*.test.ts and excludes Playwright files.
        2. Add a src/db/test-client.ts that creates a Drizzle client pointed at
           file:./test.db. Vitest globalSetup runs drizzle-kit migrate against it
           and truncates all tables between test files (not between individual tests
           unless isolation is needed).
        3. Add src/test/factories.ts with typed factory functions (makeRecipe,
           makeIngredient, etc.) that insert rows into test.db and return the
           inserted record. Tests call factories directly — no fixtures files.
        4. Retrofit existing logic into unit-testable pure functions first:
             - extractIngredients() in seed.ts → move to src/lib/themealdb.ts, test it.
             - Future: aggregateIngredients() for story_03, batchPrepTasks() for
               story_05 — these MUST be pure functions (no DB calls inside).
        5. Move Playwright tests to coarse-grained journey tests only. Remove any
           Playwright assertions that are really logic assertions (e.g. exact
           ingredient counts) and cover those with Vitest integration tests instead.
        6. Add npm scripts: "test:unit" (vitest run), "test:e2e" (playwright test),
           "test" (vitest run && playwright test).

      DEFERRED REFACTORS NOTICED DURING story_09:
        - extractIngredients() is embedded inside seed.ts. It is a pure function and
          should live in src/lib/themealdb.ts so it can be unit-tested independently
          of the Server Action and its "use server" boundary.
        - The recipes page fetches all rows with no pagination. Once the DB has >20
          recipes this will become slow. Add cursor-based pagination before story_02.
