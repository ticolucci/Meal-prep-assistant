name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:types

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit
        env:
          TURSO_DATABASE_URL: "file:./test.db"
          TURSO_AUTH_TOKEN: "local"
          ANTHROPIC_API_KEY: "ci-test-key"

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          TURSO_DATABASE_URL: "file:./build.db"
          TURSO_AUTH_TOKEN: "local"

  deploy:
    name: Deploy to Production
    needs: [lint, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run database migrations
        run: npm run db:migrate
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      - name: Install Vercel CLI
        run: npm i -g vercel
      - name: Deploy to Vercel
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Summary
        run: echo "### Deployed to production :rocket:" >> $GITHUB_STEP_SUMMARY

  preview:
    name: Deploy Preview
    needs: [lint, test, build]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Create Turso branch database
        id: turso-branch
        run: |
          DB_NAME="meal-prep-pr-${{ github.event.pull_request.number }}"
          echo "db_name=$DB_NAME" >> $GITHUB_OUTPUT

          # Check if branch DB already exists
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.TURSO_API_TOKEN }}" \
            "https://api.turso.tech/v1/organizations/${{ secrets.TURSO_ORG_NAME }}/databases/$DB_NAME")

          if [ "$STATUS" != "200" ]; then
            echo "Creating branch database $DB_NAME..."
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.TURSO_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$DB_NAME\", \"seed\": {\"type\": \"database\", \"name\": \"${{ secrets.TURSO_PRIMARY_DB_NAME }}\"}}" \
              "https://api.turso.tech/v1/organizations/${{ secrets.TURSO_ORG_NAME }}/databases"
            echo "Waiting for database to be ready..."
            sleep 10
          else
            echo "Branch database $DB_NAME already exists"
          fi

          # Get the branch DB URL
          DB_INFO=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.TURSO_API_TOKEN }}" \
            "https://api.turso.tech/v1/organizations/${{ secrets.TURSO_ORG_NAME }}/databases/$DB_NAME")
          HOSTNAME=$(echo "$DB_INFO" | jq -r '.database.Hostname // .database.hostname')
          BRANCH_URL="libsql://$HOSTNAME"
          echo "branch_url=$BRANCH_URL" >> $GITHUB_OUTPUT

          # Create auth token for branch DB (7 day expiry)
          TOKEN_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.TURSO_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"permissions": {"read_attach": {"databases": ["'"$DB_NAME"'"]}}, "expiration": "7d"}' \
            "https://api.turso.tech/v1/organizations/${{ secrets.TURSO_ORG_NAME }}/databases/$DB_NAME/auth/tokens")
          BRANCH_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.jwt')
          echo "branch_token=$BRANCH_TOKEN" >> $GITHUB_OUTPUT
          echo "::add-mask::$BRANCH_TOKEN"

      - name: Run migrations on branch database
        run: npm run db:migrate
        env:
          TURSO_DATABASE_URL: ${{ steps.turso-branch.outputs.branch_url }}
          TURSO_AUTH_TOKEN: ${{ steps.turso-branch.outputs.branch_token }}

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Deploy preview to Vercel
        id: vercel-preview
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          PREVIEW_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

          # Set env vars on the preview deployment
          vercel env rm TURSO_DATABASE_URL preview --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
          echo "${{ steps.turso-branch.outputs.branch_url }}" | vercel env add TURSO_DATABASE_URL preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel env rm TURSO_AUTH_TOKEN preview --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
          echo "${{ steps.turso-branch.outputs.branch_token }}" | vercel env add TURSO_AUTH_TOKEN preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## Preview Deployment',
              '',
              '| Check | Status |',
              '|-------|--------|',
              '| Lint | :white_check_mark: Passed |',
              '| Tests | :white_check_mark: Passed |',
              '| Build | :white_check_mark: Passed |',
              '| Preview | :white_check_mark: Deployed |',
              '',
              `**Preview URL:** ${{ steps.vercel-preview.outputs.preview_url }}`,
              `**Branch DB:** \`${{ steps.turso-branch.outputs.db_name }}\``,
            ].join('\n');

            // Delete previous bot comments
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments.data) {
              if (comment.user.type === 'Bot' && comment.body.includes('## Preview Deployment')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  e2e-preview:
    name: E2E Tests (Preview)
    needs: [preview]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Extract preview URL from PR comment
        id: extract-url
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const previewComment = comments.data
              .reverse()
              .find(c => c.user.type === 'Bot' && c.body.includes('## Preview Deployment'));
            if (!previewComment) throw new Error('Preview comment not found');
            const match = previewComment.body.match(/\*\*Preview URL:\*\* (https:\/\/[^\s]+)/);
            if (!match) throw new Error('Preview URL not found in comment');
            core.setOutput('preview_url', match[1]);

      - name: Run E2E tests against preview
        run: npm run test:e2e
        env:
          BASE_URL: ${{ steps.extract-url.outputs.preview_url }}
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Comment E2E results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? ':white_check_mark: Passed' : ':x: Failed';
            const body = [
              '## E2E Test Results',
              '',
              `**Status:** ${status}`,
              '',
              '_Playwright report uploaded as artifact._',
            ].join('\n');

            // Delete previous E2E comments
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments.data) {
              if (comment.user.type === 'Bot' && comment.body.includes('## E2E Test Results')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
