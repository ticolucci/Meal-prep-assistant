name: Cleanup Preview

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    name: Delete Branch Database
    runs-on: ubuntu-latest
    steps:
      - name: Delete Turso branch database
        run: |
          DB_NAME="meal-prep-pr-${{ github.event.pull_request.number }}"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X DELETE \
            -H "Authorization: Bearer ${{ secrets.TURSO_API_TOKEN }}" \
            "https://api.turso.tech/v1/organizations/${{ secrets.TURSO_ORG_NAME }}/databases/$DB_NAME")

          if [ "$STATUS" = "200" ]; then
            echo "Deleted branch database $DB_NAME"
          else
            echo "Branch database $DB_NAME not found or already deleted (status: $STATUS)"
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const db = `meal-prep-pr-${{ github.event.pull_request.number }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `:broom: Cleaned up branch database \`${db}\``,
            });
